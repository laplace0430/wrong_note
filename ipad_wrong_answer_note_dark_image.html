<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>오답노트</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --panel2:#1f2937;
      --line:#334155;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --accent:#3b82f6;
      --accentSoft:#1e3a8a;
      --danger:#ef4444;
      --success:#22c55e;
      --yellow:#f59e0b;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:22px;
      --safe-top:max(16px, env(safe-area-inset-top));
      --safe-bottom:max(16px, env(safe-area-inset-bottom));
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif}
    body{min-height:100vh}
    button,input,select,textarea{font:inherit}
    .app{
      max-width:1200px;
      margin:0 auto;
      padding:var(--safe-top) 18px calc(100px + var(--safe-bottom));
    }
    .top{
      display:flex;gap:16px;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;
      margin-bottom:18px;
    }
    .title{font-size:32px;font-weight:800;letter-spacing:-.03em}
    .sub{color:var(--muted);font-size:14px;margin-top:6px;line-height:1.5}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .btn{
      min-height:46px;padding:0 16px;border-radius:16px;border:1px solid var(--line);background:var(--panel);color:var(--text);font-weight:700;
      box-shadow:var(--shadow);cursor:pointer
    }
    .btn.primary{background:var(--accent);border-color:transparent;color:#fff}
    .btn.soft{background:var(--accentSoft);color:#bfdbfe;border-color:transparent}
    .btn.danger{background:#3b1111;color:#fecaca;border-color:transparent}
    .summary{
      display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;
    }
    .metric{
      background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:var(--shadow)
    }
    .metric .n{font-size:28px;font-weight:800}
    .metric .k{font-size:13px;color:var(--muted);margin-top:4px}
    .layout{
      display:grid;grid-template-columns:340px 1fr;gap:18px;
    }
    .panel,.board{
      background:var(--panel);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow)
    }
    .panel{padding:16px;position:sticky;top:16px;height:fit-content}
    .board{padding:16px}
    .section-title{
      display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px
    }
    .section-title h2{margin:0;font-size:18px}
    .field{margin-bottom:12px}
    .field label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#cbd5e1}
    .input,.select,.textarea{
      width:100%;border:1px solid var(--line);background:var(--panel2);border-radius:16px;padding:14px 14px;color:var(--text);outline:none
    }
    .input::placeholder,.textarea::placeholder{color:#94a3b8}
    .textarea{min-height:96px;resize:vertical;line-height:1.5}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{
      border:1px solid var(--line);background:var(--panel2);border-radius:999px;padding:10px 12px;font-size:13px;font-weight:700;color:#cbd5e1;cursor:pointer
    }
    .chip.active{background:var(--accentSoft);border-color:transparent;color:#bfdbfe}
    .searchbar{
      display:grid;grid-template-columns:1fr 170px 150px;gap:10px;margin-bottom:14px
    }
    .list{
      display:flex;flex-direction:column;gap:12px
    }
    .empty{
      border:1px dashed var(--line);background:var(--panel2);border-radius:20px;padding:28px;text-align:center;color:var(--muted)
    }
    .card{
      border:1px solid var(--line);background:var(--panel2);border-radius:22px;padding:16px;box-shadow:0 4px 12px rgba(0,0,0,.18)
    }
    .card-top{
      display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap
    }
    .badges{display:flex;gap:8px;flex-wrap:wrap}
    .badge{
      display:inline-flex;align-items:center;height:30px;padding:0 10px;border-radius:999px;font-size:12px;font-weight:800
    }
    .b-subject{background:#082f49;color:#bae6fd}
    .b-unit{background:#3b0764;color:#e9d5ff}
    .b-type{background:#052e16;color:#bbf7d0}
    .b-review0{background:#450a0a;color:#fecaca}
    .b-review1{background:#451a03;color:#fde68a}
    .b-review2{background:#052e16;color:#bbf7d0}
    .problem{font-size:20px;font-weight:800;line-height:1.35;margin:12px 0 10px}
    .meta{font-size:13px;color:var(--muted)}
    .block{margin-top:12px;padding:12px 14px;background:#0f172a;border:1px solid var(--line);border-radius:16px}
    .block h3{margin:0 0 8px;font-size:14px}
    .block p{margin:0;white-space:pre-wrap;line-height:1.55}
    .card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .card-actions .btn{min-height:40px;padding:0 12px;border-radius:14px;box-shadow:none}
    .footerbar{
      position:fixed;left:0;right:0;bottom:0;padding:10px 16px var(--safe-bottom);
      background:linear-gradient(to top, rgba(11,18,32,.98), rgba(11,18,32,.92), rgba(11,18,32,0));
      backdrop-filter:blur(10px)
    }
    .footerinner{
      max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 70px;gap:10px
    }
    .quicksearch{
      min-height:56px;border-radius:18px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:0 16px;outline:none;box-shadow:var(--shadow)
    }
    .quicksearch::placeholder{color:#94a3b8}
    .fab{
      border:0;border-radius:18px;background:var(--accent);color:#fff;font-size:28px;font-weight:900;box-shadow:0 10px 30px rgba(59,130,246,.3);cursor:pointer
    }
    .preview-grid,.image-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .preview-item,.image-item{
      position:relative;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#0f172a;
    }
    .preview-item img,.image-item img{
      width:100%;
      height:100%;
      min-height:110px;
      object-fit:cover;
      display:block;
    }
    .remove-image-btn{
      position:absolute;
      top:6px;
      right:6px;
      min-height:auto;
      padding:6px 8px;
      border-radius:10px;
      font-size:12px;
      background:rgba(239,68,68,.92);
      color:white;
      border:none;
      cursor:pointer;
    }
    .hint{font-size:12px;color:var(--muted);margin-top:6px}
    .field-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    @media (max-width: 980px){
      .summary{grid-template-columns:repeat(2,1fr)}
      .layout{grid-template-columns:1fr}
      .panel{position:static}
      .searchbar{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="title">오답노트</div>
        <div class="sub">아이패드에서 손으로 정리하듯 쓰기 편한 오답 정리용 웹앱</div>
      </div>
      <div class="actions">
        <button class="btn soft" id="sampleBtn">예시 추가</button>
        <button class="btn" id="exportBtn">내보내기</button>
        <button class="btn" id="importBtn">불러오기</button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
    </div>

    <div class="summary">
      <div class="metric"><div class="n" id="totalCount">0</div><div class="k">전체 오답</div></div>
      <div class="metric"><div class="n" id="todayCount">0</div><div class="k">오늘 추가</div></div>
      <div class="metric"><div class="n" id="needReviewCount">0</div><div class="k">복습 필요</div></div>
      <div class="metric"><div class="n" id="doneCount">0</div><div class="k">복습 완료</div></div>
    </div>

    <div class="layout">
      <aside class="panel">
        <div class="section-title">
          <h2 id="formTitle">오답 추가</h2>
          <button class="btn" id="resetFormBtn">초기화</button>
        </div>

        <div class="field">
          <label for="subjectInput">과목</label>
          <select class="select" id="subjectInput">
            <option value="수학">수학</option>
            <option value="물리">물리</option>
            <option value="화학">화학</option>
            <option value="생명과학">생명과학</option>
            <option value="지구과학">지구과학</option>
            <option value="국어">국어</option>
            <option value="영어">영어</option>
            <option value="사회">사회</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="row2">
          <div class="field">
            <label for="unitInput">단원</label>
            <input class="input" id="unitInput" placeholder="예: 적분, 역학, 전자기" />
          </div>
          <div class="field">
            <label for="typeInput">유형</label>
            <input class="input" id="typeInput" placeholder="예: 계산 실수, 개념 미흡" />
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="dateInput">푼 날짜</label>
            <input class="input" id="dateInput" type="date" />
          </div>
          <div class="field">
            <label for="sourceInput">출처</label>
            <input class="input" id="sourceInput" placeholder="예: 모의고사 12번" />
          </div>
        </div>

        <div class="field">
          <label for="problemInput">문제 / 제목</label>
          <textarea class="textarea" id="problemInput" placeholder="어떤 문제였는지 간단히 적기"></textarea>
        </div>

        <div class="field">
          <label>틀린 이유</label>
          <div class="chips" id="reasonChips">
            <button type="button" class="chip active" data-value="개념 부족">개념 부족</button>
            <button type="button" class="chip" data-value="계산 실수">계산 실수</button>
            <button type="button" class="chip" data-value="조건 해석 실수">조건 해석 실수</button>
            <button type="button" class="chip" data-value="시간 부족">시간 부족</button>
            <button type="button" class="chip" data-value="암기 부족">암기 부족</button>
          </div>
        </div>

        <div class="field">
          <label for="reasonDetailInput">세부 원인</label>
          <textarea class="textarea" id="reasonDetailInput" placeholder="왜 틀렸는지 자세히 적기"></textarea>
        </div>

        <div class="field">
          <label for="correctInput">정답 / 다시 푼 핵심</label>
          <textarea class="textarea" id="correctInput" placeholder="다시 풀어서 핵심 풀이와 정답 정리"></textarea>
        </div>

        <div class="field">
          <label for="memoryInput">다음에 안 틀리기 위한 한 줄</label>
          <textarea class="textarea" id="memoryInput" placeholder="예: 부호 먼저 확인, 조건문장 두 번 읽기"></textarea>
        </div>

        <div class="field">
          <label for="imageInput">문제 사진</label>
          <input class="input" id="imageInput" type="file" accept="image/*" multiple />
          <div class="hint">여러 장 첨부 가능. 문제 캡처나 필기 사진을 넣어둘 수 있어.</div>
          <div class="preview-grid" id="imagePreview"></div>
        </div>

        <div class="row2">
          <button class="btn primary" id="saveBtn">저장</button>
          <button class="btn" id="reviewBtn">복습 완료 표시</button>
        </div>
      </aside>

      <main class="board">
        <div class="section-title">
          <h2>정리된 오답</h2>
          <div class="meta" id="listMeta">0개 표시 중</div>
        </div>

        <div class="searchbar">
          <input class="input" id="searchInput" placeholder="문제, 단원, 이유 검색" />
          <select class="select" id="subjectFilter">
            <option value="전체">전체 과목</option>
            <option value="수학">수학</option>
            <option value="물리">물리</option>
            <option value="화학">화학</option>
            <option value="생명과학">생명과학</option>
            <option value="지구과학">지구과학</option>
            <option value="국어">국어</option>
            <option value="영어">영어</option>
            <option value="사회">사회</option>
            <option value="기타">기타</option>
          </select>
          <select class="select" id="reviewFilter">
            <option value="전체">전체 상태</option>
            <option value="복습 필요">복습 필요</option>
            <option value="복습 중">복습 중</option>
            <option value="복습 완료">복습 완료</option>
          </select>
        </div>

        <div class="list" id="list"></div>
      </main>
    </div>
  </div>

  <div class="footerbar">
    <div class="footerinner">
      <input class="quicksearch" id="quickSearch" placeholder="빠르게 검색" />
      <button class="fab" id="newBtn">+</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "ipad_wrong_answer_note_dark_image_v1";
    let notes = loadNotes();
    let editingId = null;
    let currentImages = [];

    const today = new Date().toISOString().slice(0,10);
    document.getElementById("dateInput").value = today;

    const reasonChips = [...document.querySelectorAll("#reasonChips .chip")];
    const formTitle = document.getElementById("formTitle");
    const imageInput = document.getElementById("imageInput");
    const imagePreview = document.getElementById("imagePreview");

    function loadNotes(){
      try{
        const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(raw) ? raw : [];
      }catch{
        return [];
      }
    }

    function saveNotes(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function esc(text){
      return String(text ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function selectedReason(){
      const active = reasonChips.find(chip => chip.classList.contains("active"));
      return active ? active.dataset.value : "개념 부족";
    }

    reasonChips.forEach(chip=>{
      chip.addEventListener("click", ()=>{
        reasonChips.forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
      });
    });

    function reviewLabel(status){
      if(status === 2) return "복습 완료";
      if(status === 1) return "복습 중";
      return "복습 필요";
    }

    function reviewBadgeClass(status){
      if(status === 2) return "b-review2";
      if(status === 1) return "b-review1";
      return "b-review0";
    }

    function renderImagePreview(){
      if(currentImages.length === 0){
        imagePreview.innerHTML = "";
        return;
      }

      imagePreview.innerHTML = currentImages.map((img, idx) => `
        <div class="preview-item">
          <img src="${img}" alt="preview-${idx}">
          <button type="button" class="remove-image-btn" onclick="removePreviewImage(${idx})">삭제</button>
        </div>
      `).join("");
    }

    window.removePreviewImage = function(idx){
      currentImages.splice(idx, 1);
      renderImagePreview();
    }

    function readFileAsDataURL(file){
      return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.onload = ()=> resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    imageInput.addEventListener("change", async (e)=>{
      const files = Array.from(e.target.files || []);
      if(files.length === 0) return;
      const loaded = await Promise.all(files.map(readFileAsDataURL));
      currentImages.push(...loaded);
      imageInput.value = "";
      renderImagePreview();
    });

    function getFormData(){
      const problem = document.getElementById("problemInput").value.trim();
      if(!problem){
        alert("문제 / 제목을 입력해.");
        document.getElementById("problemInput").focus();
        return null;
      }

      return {
        id: editingId || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
        subject: document.getElementById("subjectInput").value,
        unit: document.getElementById("unitInput").value.trim(),
        type: document.getElementById("typeInput").value.trim(),
        date: document.getElementById("dateInput").value || today,
        source: document.getElementById("sourceInput").value.trim(),
        problem,
        reason: selectedReason(),
        reasonDetail: document.getElementById("reasonDetailInput").value.trim(),
        correct: document.getElementById("correctInput").value.trim(),
        memory: document.getElementById("memoryInput").value.trim(),
        images: [...currentImages],
        reviewStatus: 0,
        createdAt: Date.now()
      };
    }

    function resetForm(){
      editingId = null;
      formTitle.textContent = "오답 추가";
      document.getElementById("subjectInput").value = "수학";
      document.getElementById("unitInput").value = "";
      document.getElementById("typeInput").value = "";
      document.getElementById("dateInput").value = today;
      document.getElementById("sourceInput").value = "";
      document.getElementById("problemInput").value = "";
      document.getElementById("reasonDetailInput").value = "";
      document.getElementById("correctInput").value = "";
      document.getElementById("memoryInput").value = "";
      currentImages = [];
      imageInput.value = "";
      renderImagePreview();
      reasonChips.forEach(c=>c.classList.remove("active"));
      reasonChips[0].classList.add("active");
    }

    function saveCurrent(){
      const data = getFormData();
      if(!data) return;

      if(editingId){
        const idx = notes.findIndex(n => n.id === editingId);
        if(idx !== -1){
          data.reviewStatus = notes[idx].reviewStatus;
          data.createdAt = notes[idx].createdAt;
          notes[idx] = data;
        }
      }else{
        notes.unshift(data);
      }

      saveNotes();
      resetForm();
      render();
    }

    function markReviewDone(){
      if(!editingId){
        alert("먼저 오른쪽 목록에서 수정할 오답을 선택해.");
        return;
      }
      const idx = notes.findIndex(n => n.id === editingId);
      if(idx === -1) return;
      notes[idx].reviewStatus = 2;
      saveNotes();
      render();
    }

    function openEdit(id){
      const note = notes.find(n => n.id === id);
      if(!note) return;
      editingId = note.id;
      formTitle.textContent = "오답 수정";
      document.getElementById("subjectInput").value = note.subject || "수학";
      document.getElementById("unitInput").value = note.unit || "";
      document.getElementById("typeInput").value = note.type || "";
      document.getElementById("dateInput").value = note.date || today;
      document.getElementById("sourceInput").value = note.source || "";
      document.getElementById("problemInput").value = note.problem || "";
      document.getElementById("reasonDetailInput").value = note.reasonDetail || "";
      document.getElementById("correctInput").value = note.correct || "";
      document.getElementById("memoryInput").value = note.memory || "";
      currentImages = Array.isArray(note.images) ? [...note.images] : [];
      renderImagePreview();
      reasonChips.forEach(c => c.classList.toggle("active", c.dataset.value === (note.reason || "개념 부족")));
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function cycleReview(id){
      const idx = notes.findIndex(n => n.id === id);
      if(idx === -1) return;
      notes[idx].reviewStatus = (notes[idx].reviewStatus + 1) % 3;
      saveNotes();
      render();
    }

    function removeNote(id){
      const note = notes.find(n => n.id === id);
      if(!note) return;
      if(!confirm(`'${note.problem.slice(0,20)}' 삭제할까?`)) return;
      notes = notes.filter(n => n.id !== id);
      if(editingId === id) resetForm();
      saveNotes();
      render();
    }

    function duplicateNote(id){
      const note = notes.find(n => n.id === id);
      if(!note) return;
      notes.unshift({
        ...note,
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        problem: note.problem + " (복사본)",
        reviewStatus: 0,
        createdAt: Date.now()
      });
      saveNotes();
      render();
    }

    function filteredNotes(){
      const keyword = (document.getElementById("searchInput").value || document.getElementById("quickSearch").value || "").trim().toLowerCase();
      const subjectFilter = document.getElementById("subjectFilter").value;
      const reviewFilter = document.getElementById("reviewFilter").value;

      return [...notes].filter(note => {
        const matchesKeyword = !keyword || [
          note.problem, note.unit, note.reason, note.reasonDetail, note.correct, note.memory, note.source, note.type
        ].join(" ").toLowerCase().includes(keyword);

        const matchesSubject = subjectFilter === "전체" || note.subject === subjectFilter;
        const label = reviewLabel(note.reviewStatus);
        const matchesReview = reviewFilter === "전체" || label === reviewFilter;

        return matchesKeyword && matchesSubject && matchesReview;
      }).sort((a,b)=> (b.createdAt || 0) - (a.createdAt || 0));
    }

    function renderSummary(){
      const total = notes.length;
      const todayCount = notes.filter(n => n.date === today).length;
      const needReview = notes.filter(n => n.reviewStatus !== 2).length;
      const done = notes.filter(n => n.reviewStatus === 2).length;

      document.getElementById("totalCount").textContent = total;
      document.getElementById("todayCount").textContent = todayCount;
      document.getElementById("needReviewCount").textContent = needReview;
      document.getElementById("doneCount").textContent = done;
    }

    function render(){
      renderSummary();
      const list = document.getElementById("list");
      const data = filteredNotes();
      document.getElementById("listMeta").textContent = `${data.length}개 표시 중`;

      if(data.length === 0){
        list.innerHTML = `<div class="empty">아직 정리된 오답이 없어. 왼쪽에서 첫 오답을 추가해.</div>`;
        return;
      }

      list.innerHTML = data.map(note => `
        <div class="card">
          <div class="card-top">
            <div class="badges">
              <span class="badge b-subject">${esc(note.subject || "기타")}</span>
              ${note.unit ? `<span class="badge b-unit">${esc(note.unit)}</span>` : ""}
              ${note.type ? `<span class="badge b-type">${esc(note.type)}</span>` : ""}
              <span class="badge ${reviewBadgeClass(note.reviewStatus)}">${reviewLabel(note.reviewStatus)}</span>
            </div>
            <div class="meta">${esc(note.date || "")}${note.source ? " · " + esc(note.source) : ""}</div>
          </div>

          <div class="problem">${esc(note.problem)}</div>

          ${(Array.isArray(note.images) && note.images.length > 0) ? `
            <div class="image-grid">
              ${note.images.map(img => `
                <div class="image-item">
                  <img src="${img}" alt="note-image">
                </div>
              `).join("")}
            </div>
          ` : ""}

          <div class="block">
            <h3>틀린 이유</h3>
            <p><strong>${esc(note.reason || "")}</strong>${note.reasonDetail ? "\n" + esc(note.reasonDetail) : ""}</p>
          </div>

          <div class="block">
            <h3>다시 푼 핵심</h3>
            <p>${esc(note.correct || "아직 정리 안 함")}</p>
          </div>

          <div class="block">
            <h3>다음에 안 틀리기 위한 한 줄</h3>
            <p>${esc(note.memory || "아직 정리 안 함")}</p>
          </div>

          <div class="card-actions">
            <button class="btn" onclick="openEdit('${note.id}')">수정</button>
            <button class="btn soft" onclick="cycleReview('${note.id}')">복습 상태 변경</button>
            <button class="btn" onclick="duplicateNote('${note.id}')">복제</button>
            <button class="btn danger" onclick="removeNote('${note.id}')">삭제</button>
          </div>
        </div>
      `).join("");
    }

    function exportData(){
      const blob = new Blob([JSON.stringify(notes, null, 2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "ipad_wrong_answer_notes_dark_image.json";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function importData(file){
      const reader = new FileReader();
      reader.onload = () => {
        try{
          const parsed = JSON.parse(reader.result);
          if(!Array.isArray(parsed)) throw new Error();
          notes = parsed.map(note => ({
            ...note,
            images: Array.isArray(note.images) ? note.images : []
          }));
          saveNotes();
          resetForm();
          render();
        }catch{
          alert("올바른 JSON 파일이 아니야.");
        }
      };
      reader.readAsText(file, "utf-8");
    }

    function addSample(){
      if(notes.length > 0 && !confirm("이미 데이터가 있는데 예시를 추가할까?")) return;
      notes.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        subject:"수학",
        unit:"적분",
        type:"계산 실수",
        date:today,
        source:"기출 21번",
        problem:"부분적분을 두 번 써야 하는 문제였는데 첫 단계에서 부호를 잘못 처리함.",
        reason:"계산 실수",
        reasonDetail:"미분되는 항과 적분되는 항을 바꿔 적었고 마지막 부호 확인을 안 함.",
        correct:"u=x, dv=e^x dx로 놓고 부분적분 후 다시 한 번 적용. 마지막에 상수항 정리까지 확인.",
        memory:"부분적분 문제는 식 변형 끝난 뒤 부호를 한 번 더 체크.",
        images:[],
        reviewStatus:1,
        createdAt:Date.now()
      });
      saveNotes();
      render();
    }

    document.getElementById("saveBtn").addEventListener("click", saveCurrent);
    document.getElementById("reviewBtn").addEventListener("click", markReviewDone);
    document.getElementById("resetFormBtn").addEventListener("click", resetForm);
    document.getElementById("exportBtn").addEventListener("click", exportData);
    document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", e=>{
      const file = e.target.files?.[0];
      if(file) importData(file);
      e.target.value = "";
    });
    document.getElementById("sampleBtn").addEventListener("click", addSample);
    document.getElementById("newBtn").addEventListener("click", ()=>{
      resetForm();
      window.scrollTo({top:0, behavior:"smooth"});
      document.getElementById("problemInput").focus();
    });

    document.getElementById("searchInput").addEventListener("input", e=>{
      document.getElementById("quickSearch").value = e.target.value;
      render();
    });
    document.getElementById("quickSearch").addEventListener("input", e=>{
      document.getElementById("searchInput").value = e.target.value;
      render();
    });
    document.getElementById("subjectFilter").addEventListener("change", render);
    document.getElementById("reviewFilter").addEventListener("change", render);

    window.openEdit = openEdit;
    window.cycleReview = cycleReview;
    window.removeNote = removeNote;
    window.duplicateNote = duplicateNote;

    resetForm();
    render();
  </script>
</body>
</html>
